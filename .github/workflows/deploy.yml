name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # VITE_API_BASE (repo variable, e.g. https://api.mindmaply.app) switches
      # the Share modal to /s links that unfurl with a diagram preview. Unset →
      # plain #/editor links, exactly as before.
      - run: pnpm build
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/editor/dist
